<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports Challenge Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <!-- START SCREEN -->
    <div class="screen active" id="start-screen">

      <h1>🏆 Sports Challenge</h1>

      <p class="creator">
        Created by Jess Wilson Samuel
      </p>

      <p>
        Test your sports knowledge and become a champion!
      </p>

      <button id="start-btn">
        Start Game
      </button>

    </div>

    <!-- QUIZ SCREEN -->
    <div class="screen" id="quiz-screen">

      <div class="quiz-header">

        <h2 id="question-text">
          Question goes here
        </h2>

        <div class="quiz-info">

          <p>
            Question
            <span id="current-question">1</span>
            of
            <span id="total-questions">5</span>
          </p>

          <p>
            Score:
            <span id="score">0</span>
          </p>

        </div>

      </div>

      <div id="answers-container" class="answers-container">
      </div>

      <div class="progress-bar">
        <div id="progress" class="progress"></div>
      </div>

    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen">

      <h1>🏅 Final Results</h1>

      <div class="result-info">

        <p>
          You scored
          <span id="final-score">0</span>
          out of
          <span id="max-score">5</span>
        </p>

        <div id="result-message">
          Great effort!
        </div>

      </div>

      <button id="restart-btn">
        Play Again
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
